    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    const UFS = ['AC','AL','AM','AP','BA','CE','DF','ES','GO','MA','MG','MS','MT','PA','PB','PE','PI','PR','RJ','RN','RO','RR','RS','SC','SE','SP','TO'];

    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.uf-select').forEach(sel => {
            UFS.forEach(uf => { const o = document.createElement('option'); o.value = uf; o.textContent = uf; sel.appendChild(o); });
        });
        // IBAMA stats
        fetch('/api/stats').then(r => r.json()).then(d => {
            const ibStats = `IBAMA: ${(d.autos_infracao||0).toLocaleString('pt-BR')} autos, ${(d.termos_embargo||0).toLocaleString('pt-BR')} embargos`;
            fetch('/api/sema/stats').then(r => r.json()).then(s => {
                const smStats = `SEMA-MT: ${(s.sema_autos_infracao||0).toLocaleString('pt-BR')} autos, ${(s.sema_areas_embargadas||0).toLocaleString('pt-BR')} embargos`;
                document.getElementById('db-stats').textContent = ibStats + '  |  ' + smStats;
            }).catch(() => { document.getElementById('db-stats').textContent = ibStats; });
        });
    });

    // ---- UTILS ----
    function spin(id, on) { document.getElementById(id).classList.toggle('active', on); }
    function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function fmtData(v) { if (!v) return '-'; if (v.length >= 10) return v.substring(0,10).split('-').reverse().join('/'); return v; }
    function fmtValor(v) {
        if (!v || v === '' || v === '0') return '-';
        try { const n = parseFloat(String(v).replace(/\./g,'').replace(',','.')); if (isNaN(n) || n === 0) return '-';
            return 'R$ ' + n.toLocaleString('pt-BR', {minimumFractionDigits:2}); } catch { return v; }
    }
    function fmtValorNum(v) {
        if (!v || v === '') return '-';
        try { const n = parseFloat(v); if (isNaN(n) || n === 0) return '-';
            return 'R$ ' + n.toLocaleString('pt-BR', {minimumFractionDigits:2}); } catch { return v; }
    }

    // ---- DETAIL TOGGLE (generic) ----
    function toggleDetail(btn, rec) {
        const tr = btn.closest('tr');
        const next = tr.nextElementSibling;
        if (next && next.classList.contains('detail-row')) { next.remove(); btn.textContent = '+'; return; }
        btn.textContent = '-';
        const r = JSON.parse(rec);
        const skip = new Set(['NOME_NORM','MUNICIPIO_NORM','CPF_CNPJ_NORM','NUM_PROCESSO_NORM',
            'SEQ_AUTO_INFRACAO','SEQ_TAD','NUM_PESSOA_INFRATOR','NUM_PESSOA_EMBARGO','COD_MUNICIPIO']);
        let html = '<td colspan="100%" class="detail-content"><div class="row">';
        for (const [k, v] of Object.entries(r)) {
            if (skip.has(k) || !v || v === '') continue;
            html += `<div class="col-md-4 mb-1"><dt>${esc(k.replace(/_/g,' '))}</dt><dd>${esc(String(v))}</dd></div>`;
        }
        html += '</div></td>';
        const detailTr = document.createElement('tr'); detailTr.classList.add('detail-row'); detailTr.innerHTML = html;
        tr.after(detailTr);
    }

    // ================================================================
    //                    IBAMA FUNCTIONS
    // ================================================================
    function ibSearchAutos() {
        spin('spin-ib-autos', true);
        const p = new URLSearchParams();
        const map = {nome:'ib-ai-nome',cpf_cnpj:'ib-ai-cpf',uf:'ib-ai-uf',municipio:'ib-ai-municipio',
            num_auto:'ib-ai-num-auto',num_processo:'ib-ai-processo',tipo_infracao:'ib-ai-tipo',
            ano_inicio:'ib-ai-ano-ini',ano_fim:'ib-ai-ano-fim',limit:'ib-ai-limit'};
        for (const [k,id] of Object.entries(map)) { const v = document.getElementById(id).value.trim(); if (v) p.set(k,v); }

    function ibSearchTexto() {
        spin('spin-ib-texto', true);
        const q = document.getElementById('ib-fts-q').value.trim();
        if (!q) { spin('spin-ib-texto',false); return; }
        const tabela = document.getElementById('ib-fts-tabela').value;
        const limit = document.getElementById('ib-fts-limit').value;
        fetch(`/api/texto?q=${encodeURIComponent(q)}&tabela=${tabela}&limit=${limit}`).then(r=>r.json()).then(d => {
            spin('spin-ib-texto',false);
            if (d.error) { alert(d.error + (d.hint ? '\n'+d.hint : '')); return; }
            document.getElementById('count-ib-texto').textContent = `${d.total.toLocaleString('pt-BR')} resultados (exibindo ${d.showing})`;
            const t = document.getElementById('table-ib-texto');
            t.querySelector('thead').innerHTML = tabela==='autos'
                ? '<tr><th></th><th>Data</th><th>Auto</th><th>Infrator</th><th>UF</th><th>Municipio</th><th>Descricao</th><th>Valor</th></tr>'
                : '<tr><th></th><th>Data</th><th>TAD</th><th>Embargado</th><th>UF</th><th>Municipio</th><th>Descricao</th><th>Area</th></tr>';
            const tb = t.querySelector('tbody'); tb.innerHTML = '';
            d.results.forEach(r => {
                const tr = document.createElement('tr'); tr.style.cursor='pointer'; tr.dataset.record = JSON.stringify(r);
                if (tabela==='autos') {
                    const desc = (r.DES_AUTO_INFRACAO||'').substring(0,80);
                    tr.innerHTML = `<td><button class="btn btn-sm btn-outline-secondary" onclick="toggleDetail(this, this.closest('tr').dataset.record)">+</button></td>

                        <td title="${esc(r.DES_AUTO_INFRACAO)}">${esc(desc)}...</td><td>${fmtValor(r.VAL_AUTO_INFRACAO)}</td>`;

                    const desc = (r.DES_TAD||'').substring(0,80);
                    tr.innerHTML = `<td><button class="btn btn-sm btn-outline-secondary" onclick="toggleDetail(this, this.closest('tr').dataset.record)">+</button></td>

            });
        }).catch(e => { spin('spin-ib-texto',false); alert('Erro: '+e); });

    function renderIbResumo(d) {
        const ai = d.autos_infracao, te = d.termos_embargo;

            h += '<div class="card mb-3"><div class="card-body"><h5 class="resumo-section">Ultimos Autos</h5><table class="table table-sm"><thead><tr><th>Data</th><th>Auto</th><th>Tipo</th><th>UF</th><th>Municipio</th><th>Valor</th><th>Status</th></tr></thead><tbody>';

            h += '</tbody></table></div></div>';
        }
        if (d.embargos_ativos && d.embargos_ativos.length) {
            h += '<div class="card mb-3"><div class="card-body"><h5 class="resumo-section">Embargos Ativos</h5><table class="table table-sm"><thead><tr><th>Data</th><th>TAD</th><th>UF</th><th>Municipio</th><th>Area</th><th>Localizacao</th></tr></thead><tbody>';

            h += '</tbody></table></div></div>';
        }
        document.getElementById('ib-resumo-content').innerHTML = h;
    }
