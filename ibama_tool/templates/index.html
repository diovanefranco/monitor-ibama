<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor IBAMA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f5f6fa; }
        .navbar { background: linear-gradient(135deg, #1b5e20, #2e7d32) !important; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
        .nav-tabs .nav-link.active { font-weight: 600; border-color: #2e7d32; color: #2e7d32; }
        .nav-tabs .nav-link { color: #555; }
        .table th { background: #f8f9fa; position: sticky; top: 0; font-size: .85rem; }
        .table td { font-size: .85rem; }
        .badge-ativo { background: #c62828; }
        .badge-cancelado { background: #9e9e9e; }
        .badge-desembargado { background: #2e7d32; }
        .stats-card { text-align: center; padding: 1.5rem; }
        .stats-card h2 { color: #2e7d32; font-weight: 700; }
        .spinner { display: none; }
        .spinner.active { display: inline-block; }
        .detail-row { background: #f8fff8 !important; }
        .detail-content { font-size: .82rem; }
        .detail-content dt { color: #555; }
        .result-count { color: #666; font-size: .9rem; }
        #results-wrapper { max-height: 70vh; overflow-y: auto; }
        .form-label { font-size: .85rem; font-weight: 500; }
        .form-control, .form-select { font-size: .85rem; }
        .resumo-section h5 { color: #1b5e20; border-bottom: 2px solid #e8f5e9; padding-bottom: .5rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Monitor IBAMA</span>
            <span class="text-white-50 small" id="db-stats"></span>
            <a href="/logout" class="btn btn-outline-light btn-sm ms-3">Sair</a>
        </div>
    </nav>

    <div class="container">
        <!-- Tabs -->
        <ul class="nav nav-tabs mb-3" role="tablist">
            <li class="nav-item">
                <a class="nav-link active" data-bs-toggle="tab" href="#tab-autos">Autos de Infracao</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-bs-toggle="tab" href="#tab-embargos">Termos de Embargo</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-bs-toggle="tab" href="#tab-texto">Busca Livre</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-bs-toggle="tab" href="#tab-resumo">Resumo Autuado</a>
            </li>
        </ul>

        <div class="tab-content">
            <!-- AUTOS -->
            <div class="tab-pane fade show active" id="tab-autos">
                <div class="card mb-3">
                    <div class="card-body">
                        <form id="form-autos" onsubmit="searchAutos(); return false;">
                            <div class="row g-2">
                                <div class="col-md-3">
                                    <label class="form-label">Nome do Infrator</label>
                                    <input type="text" class="form-control" id="ai-nome" placeholder="Nome ou parte do nome">
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label">CPF/CNPJ</label>
                                    <input type="text" class="form-control" id="ai-cpf" placeholder="Apenas numeros">
                                </div>
                                <div class="col-md-1">
                                    <label class="form-label">UF</label>
                                    <select class="form-select" id="ai-uf">
                                        <option value="">Todas</option>
                                    </select>
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label">Municipio</label>
                                    <input type="text" class="form-control" id="ai-municipio" placeholder="Municipio">
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label">N. Auto</label>
                                    <input type="text" class="form-control" id="ai-num-auto" placeholder="Numero">
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label">N. Processo</label>
                                    <input type="text" class="form-control" id="ai-processo" placeholder="Processo">
                                </div>
                            </div>
                            <div class="row g-2 mt-1">
                                <div class="col-md-2">
                                    <label class="form-label">Tipo Infracao</label>
                                    <select class="form-select" id="ai-tipo">
                                        <option value="">Todos</option>
                                        <option value="Flora">Flora</option>
                                        <option value="Fauna">Fauna</option>
                                        <option value="Pesca">Pesca</option>
                                        <option value="Controle ambiental">Ctrl Ambiental</option>
                                        <option value="Cadastro">Cadastro</option>
                                        <option value="Unidade de conserva">Unid. Conservacao</option>
                                    </select>
                                </div>
                                <div class="col-md-1">
                                    <label class="form-label">De</label>
                                    <input type="number" class="form-control" id="ai-ano-ini" placeholder="Ano" min="1977" max="2026">
                                </div>
                                <div class="col-md-1">
                                    <label class="form-label">Ate</label>
                                    <input type="number" class="form-control" id="ai-ano-fim" placeholder="Ano" min="1977" max="2026">
                                </div>
                                <div class="col-md-1">
                                    <label class="form-label">Limite</label>
                                    <select class="form-select" id="ai-limit">
                                        <option value="50" selected>50</option>
                                        <option value="100">100</option>
                                        <option value="200">200</option>
                                        <option value="500">500</option>
                                    </select>
                                </div>
                                <div class="col-md-2 d-flex align-items-end">
                                    <button type="submit" class="btn btn-success w-100">
                                        <span class="spinner spinner-border spinner-border-sm" id="spin-autos"></span>
                                        Pesquisar
                                    </button>
                                </div>
                                <div class="col-md-2 d-flex align-items-end">
                                    <button type="button" class="btn btn-outline-secondary w-100" onclick="clearForm('autos')">Limpar</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="result-count mb-2" id="count-autos"></div>
                <div id="results-wrapper">
                    <div class="table-responsive">
                        <table class="table table-hover table-sm" id="table-autos">
                            <thead></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- EMBARGOS -->
            <div class="tab-pane fade" id="tab-embargos">
                <div class="card mb-3">
                    <div class="card-body">
                        <form id="form-embargos" onsubmit="searchEmbargos(); return false;">
                            <div class="row g-2">
                                <div class="col-md-3">
                                    <label class="form-label">Nome do Embargado</label>
                                    <input type="text" class="form-control" id="te-nome" placeholder="Nome ou parte">
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label">CPF/CNPJ</label>
                                    <input type="text" class="form-control" id="te-cpf" placeholder="Apenas numeros">
                                </div>
                                <div class="col-md-1">
                                    <label class="form-label">UF</label>
                                    <select class="form-select" id="te-uf">
                                        <option value="">Todas</option>
                                    </select>
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label">Municipio</label>
                                    <input type="text" class="form-control" id="te-municipio" placeholder="Municipio">
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label">N. TAD</label>
                                    <input type="text" class="form-control" id="te-num-tad" placeholder="Numero">
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label">N. Processo</label>
                                    <input type="text" class="form-control" id="te-processo" placeholder="Processo">
                                </div>
                            </div>
                            <div class="row g-2 mt-1">
                                <div class="col-md-2">
                                    <label class="form-label">N. Auto Vinculado</label>
                                    <input type="text" class="form-control" id="te-num-auto" placeholder="Auto">
                                </div>
                                <div class="col-md-1">
                                    <label class="form-label">Limite</label>
                                    <select class="form-select" id="te-limit">
                                        <option value="50" selected>50</option>
                                        <option value="100">100</option>
                                        <option value="200">200</option>
                                    </select>
                                </div>
                                <div class="col-md-2 d-flex align-items-end">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="te-ativos">
                                        <label class="form-check-label" for="te-ativos">Somente ativos</label>
                                    </div>
                                </div>
                                <div class="col-md-2 d-flex align-items-end">
                                    <button type="submit" class="btn btn-success w-100">
                                        <span class="spinner spinner-border spinner-border-sm" id="spin-embargos"></span>
                                        Pesquisar
                                    </button>
                                </div>
                                <div class="col-md-2 d-flex align-items-end">
                                    <button type="button" class="btn btn-outline-secondary w-100" onclick="clearForm('embargos')">Limpar</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="result-count mb-2" id="count-embargos"></div>
                <div id="results-wrapper">
                    <div class="table-responsive">
                        <table class="table table-hover table-sm" id="table-embargos">
                            <thead></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- BUSCA LIVRE -->
            <div class="tab-pane fade" id="tab-texto">
                <div class="card mb-3">
                    <div class="card-body">
                        <form onsubmit="searchTexto(); return false;">
                            <div class="row g-2">
                                <div class="col-md-5">
                                    <label class="form-label">Termo de busca (texto livre)</label>
                                    <input type="text" class="form-control" id="fts-q" placeholder='Ex: "desmatamento ilegal" OR queimada'>
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label">Buscar em</label>
                                    <select class="form-select" id="fts-tabela">
                                        <option value="autos">Autos de Infracao</option>
                                        <option value="embargos">Termos de Embargo</option>
                                    </select>
                                </div>
                                <div class="col-md-1">
                                    <label class="form-label">Limite</label>
                                    <select class="form-select" id="fts-limit">
                                        <option value="50" selected>50</option>
                                        <option value="100">100</option>
                                        <option value="200">200</option>
                                    </select>
                                </div>
                                <div class="col-md-2 d-flex align-items-end">
                                    <button type="submit" class="btn btn-success w-100">
                                        <span class="spinner spinner-border spinner-border-sm" id="spin-texto"></span>
                                        Pesquisar
                                    </button>
                                </div>
                            </div>
                            <div class="form-text mt-1">Use aspas para frases exatas. OR para alternativas. * para prefixo (ex: desmata*)</div>
                        </form>
                    </div>
                </div>
                <div class="result-count mb-2" id="count-texto"></div>
                <div id="results-wrapper">
                    <div class="table-responsive">
                        <table class="table table-hover table-sm" id="table-texto">
                            <thead></thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- RESUMO -->
            <div class="tab-pane fade" id="tab-resumo">
                <div class="card mb-3">
                    <div class="card-body">
                        <form onsubmit="searchResumo(); return false;">
                            <div class="row g-2">
                                <div class="col-md-4">
                                    <label class="form-label">Nome</label>
                                    <input type="text" class="form-control" id="res-nome" placeholder="Nome do infrator/embargado">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label">CPF/CNPJ</label>
                                    <input type="text" class="form-control" id="res-cpf" placeholder="CPF ou CNPJ">
                                </div>
                                <div class="col-md-2 d-flex align-items-end">
                                    <button type="submit" class="btn btn-success w-100">
                                        <span class="spinner spinner-border spinner-border-sm" id="spin-resumo"></span>
                                        Consultar
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
                <div id="resumo-content"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    const UFS = ['AC','AL','AM','AP','BA','CE','DF','ES','GO','MA','MG','MS','MT','PA','PB','PE','PI','PR','RJ','RN','RO','RR','RS','SC','SE','SP','TO'];

    document.addEventListener('DOMContentLoaded', () => {
        // Populate UF dropdowns
        for (const sel of document.querySelectorAll('#ai-uf, #te-uf')) {
            UFS.forEach(uf => {
                const opt = document.createElement('option');
                opt.value = uf; opt.textContent = uf;
                sel.appendChild(opt);
            });
        }
        // Load stats
        fetch('/api/stats').then(r => r.json()).then(d => {
            document.getElementById('db-stats').textContent =
                `${(d.autos_infracao||0).toLocaleString('pt-BR')} autos | ${(d.termos_embargo||0).toLocaleString('pt-BR')} embargos | ${d.db_size_mb}MB`;
        });
    });

    function spin(id, on) {
        document.getElementById(id).classList.toggle('active', on);
    }

    function fmtValor(v) {
        if (!v || v === '') return '-';
        try {
            const n = parseFloat(v.replace(/\./g, '').replace(',', '.'));
            return 'R$ ' + n.toLocaleString('pt-BR', {minimumFractionDigits: 2});
        } catch { return v; }
    }

    function fmtData(v) {
        if (!v) return '-';
        if (v.length >= 10) return v.substring(0, 10).split('-').reverse().join('/');
        return v;
    }

    function esc(s) {
        if (!s) return '';
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function clearForm(type) {
        const form = document.getElementById('form-' + type);
        if (form) form.reset();
    }

    // ---- AUTOS ----
    function searchAutos() {
        spin('spin-autos', true);
        const p = new URLSearchParams();
        const map = {nome:'ai-nome', cpf_cnpj:'ai-cpf', uf:'ai-uf', municipio:'ai-municipio',
                     num_auto:'ai-num-auto', num_processo:'ai-processo', tipo_infracao:'ai-tipo',
                     ano_inicio:'ai-ano-ini', ano_fim:'ai-ano-fim', limit:'ai-limit'};
        for (const [k, id] of Object.entries(map)) {
            const v = document.getElementById(id).value.trim();
            if (v) p.set(k, v);
        }
        fetch('/api/autos?' + p).then(r => r.json()).then(d => {
            spin('spin-autos', false);
            if (d.error) { alert(d.error); return; }
            document.getElementById('count-autos').textContent =
                `${d.total.toLocaleString('pt-BR')} resultados encontrados (exibindo ${d.showing})`;
            renderAutosTable(d.results);
        }).catch(e => { spin('spin-autos', false); alert('Erro: ' + e); });
    }

    function renderAutosTable(rows) {
        const t = document.getElementById('table-autos');
        t.querySelector('thead').innerHTML = `<tr>
            <th></th><th>Data</th><th>Auto</th><th>Processo</th><th>Infrator</th><th>CPF/CNPJ</th>
            <th>Tipo</th><th>UF</th><th>Municipio</th><th>Valor</th><th>Status</th>
        </tr>`;
        const tbody = t.querySelector('tbody');
        tbody.innerHTML = '';
        rows.forEach((r, i) => {
            const tr = document.createElement('tr');
            tr.style.cursor = 'pointer';
            const cancelado = r.SIT_CANCELADO === 'S';
            const statusBadge = cancelado
                ? '<span class="badge badge-cancelado">Cancelado</span>'
                : `<span class="badge bg-info">${esc(r.DES_STATUS_FORMULARIO || 'Ativo')}</span>`;
            const processo = r.NU_PROCESSO_FORMATADO || r.NUM_PROCESSO || '';
            tr.innerHTML = `
                <td><button class="btn btn-sm btn-outline-secondary" onclick="toggleDetail(this, 'auto', ${i})">+</button></td>
                <td>${fmtData(r.DAT_HORA_AUTO_INFRACAO)}</td>
                <td><strong>${esc(r.NUM_AUTO_INFRACAO)}</strong>/${esc(r.SER_AUTO_INFRACAO)}</td>
                <td>${esc(processo)}</td>
                <td>${esc(r.NOME_INFRATOR)}</td>
                <td>${esc(r.CPF_CNPJ_INFRATOR)}</td>
                <td>${esc(r.TIPO_INFRACAO)}</td>
                <td>${esc(r.UF)}</td>
                <td>${esc(r.MUNICIPIO)}</td>
                <td>${fmtValor(r.VAL_AUTO_INFRACAO)}</td>
                <td>${statusBadge}</td>`;
            tr.dataset.record = JSON.stringify(r);
            tbody.appendChild(tr);
        });
    }

    // ---- EMBARGOS ----
    function searchEmbargos() {
        spin('spin-embargos', true);
        const p = new URLSearchParams();
        const map = {nome:'te-nome', cpf_cnpj:'te-cpf', uf:'te-uf', municipio:'te-municipio',
                     num_tad:'te-num-tad', num_processo:'te-processo', num_auto:'te-num-auto', limit:'te-limit'};
        for (const [k, id] of Object.entries(map)) {
            const v = document.getElementById(id).value.trim();
            if (v) p.set(k, v);
        }
        if (document.getElementById('te-ativos').checked) p.set('ativos_only', 'true');
        fetch('/api/embargos?' + p).then(r => r.json()).then(d => {
            spin('spin-embargos', false);
            if (d.error) { alert(d.error); return; }
            document.getElementById('count-embargos').textContent =
                `${d.total.toLocaleString('pt-BR')} resultados encontrados (exibindo ${d.showing})`;
            renderEmbargosTable(d.results);
        }).catch(e => { spin('spin-embargos', false); alert('Erro: ' + e); });
    }

    function renderEmbargosTable(rows) {
        const t = document.getElementById('table-embargos');
        t.querySelector('thead').innerHTML = `<tr>
            <th></th><th>Data</th><th>TAD</th><th>Processo</th><th>Embargado</th><th>CPF/CNPJ</th>
            <th>UF</th><th>Municipio</th><th>Area (ha)</th><th>Situacao</th>
        </tr>`;
        const tbody = t.querySelector('tbody');
        tbody.innerHTML = '';
        rows.forEach((r, i) => {
            const tr = document.createElement('tr');
            tr.style.cursor = 'pointer';
            let sit;
            if (r.SIT_CANCELADO === 'S') sit = '<span class="badge badge-cancelado">Cancelado</span>';
            else if (r.SIT_DESEMBARGO) sit = '<span class="badge badge-desembargado">Desembargado</span>';
            else sit = '<span class="badge badge-ativo">Embargado</span>';
            tr.innerHTML = `
                <td><button class="btn btn-sm btn-outline-secondary" onclick="toggleDetail(this, 'embargo', ${i})">+</button></td>
                <td>${fmtData(r.DAT_EMBARGO)}</td>
                <td><strong>${esc(r.NUM_TAD)}</strong>/${esc(r.SER_TAD)}</td>
                <td>${esc(r.NUM_PROCESSO || '')}</td>
                <td>${esc(r.NOME_EMBARGADO)}</td>
                <td>${esc(r.CPF_CNPJ_EMBARGADO)}</td>
                <td>${esc(r.UF)}</td>
                <td>${esc(r.MUNICIPIO)}</td>
                <td>${esc(r.QTD_AREA_EMBARGADA)}</td>
                <td>${sit}</td>`;
            tr.dataset.record = JSON.stringify(r);
            tbody.appendChild(tr);
        });
    }

    // ---- BUSCA LIVRE ----
    function searchTexto() {
        spin('spin-texto', true);
        const q = document.getElementById('fts-q').value.trim();
        if (!q) { spin('spin-texto', false); return; }
        const tabela = document.getElementById('fts-tabela').value;
        const limit = document.getElementById('fts-limit').value;
        fetch(`/api/texto?q=${encodeURIComponent(q)}&tabela=${tabela}&limit=${limit}`).then(r => r.json()).then(d => {
            spin('spin-texto', false);
            if (d.error) { alert(d.error + (d.hint ? '\n' + d.hint : '')); return; }
            document.getElementById('count-texto').textContent =
                `${d.total.toLocaleString('pt-BR')} resultados (exibindo ${d.showing})`;
            if (tabela === 'autos') renderAutosTableIn('table-texto', d.results);
            else renderEmbargosTableIn('table-texto', d.results);
        }).catch(e => { spin('spin-texto', false); alert('Erro: ' + e); });
    }

    function renderAutosTableIn(tableId, rows) {
        const t = document.getElementById(tableId);
        t.querySelector('thead').innerHTML = `<tr>
            <th></th><th>Data</th><th>Auto</th><th>Processo</th><th>Infrator</th><th>UF</th><th>Municipio</th>
            <th>Descricao</th><th>Valor</th>
        </tr>`;
        const tbody = t.querySelector('tbody');
        tbody.innerHTML = '';
        rows.forEach((r, i) => {
            const tr = document.createElement('tr');
            tr.style.cursor = 'pointer';
            const desc = (r.DES_AUTO_INFRACAO || '').substring(0, 80);
            const processo = r.NU_PROCESSO_FORMATADO || r.NUM_PROCESSO || '';
            tr.innerHTML = `
                <td><button class="btn btn-sm btn-outline-secondary" onclick="toggleDetail(this, 'auto', ${i})">+</button></td>
                <td>${fmtData(r.DAT_HORA_AUTO_INFRACAO)}</td>
                <td><strong>${esc(r.NUM_AUTO_INFRACAO)}</strong></td>
                <td>${esc(processo)}</td>
                <td>${esc(r.NOME_INFRATOR)}</td>
                <td>${esc(r.UF)}</td>
                <td>${esc(r.MUNICIPIO)}</td>
                <td title="${esc(r.DES_AUTO_INFRACAO)}">${esc(desc)}${desc.length < (r.DES_AUTO_INFRACAO||'').length ? '...' : ''}</td>
                <td>${fmtValor(r.VAL_AUTO_INFRACAO)}</td>`;
            tr.dataset.record = JSON.stringify(r);
            tbody.appendChild(tr);
        });
    }

    function renderEmbargosTableIn(tableId, rows) {
        const t = document.getElementById(tableId);
        t.querySelector('thead').innerHTML = `<tr>
            <th></th><th>Data</th><th>TAD</th><th>Processo</th><th>Embargado</th><th>UF</th><th>Municipio</th>
            <th>Descricao</th><th>Area</th>
        </tr>`;
        const tbody = t.querySelector('tbody');
        tbody.innerHTML = '';
        rows.forEach((r, i) => {
            const tr = document.createElement('tr');
            tr.style.cursor = 'pointer';
            const desc = (r.DES_TAD || '').substring(0, 80);
            tr.innerHTML = `
                <td><button class="btn btn-sm btn-outline-secondary" onclick="toggleDetail(this, 'embargo', ${i})">+</button></td>
                <td>${fmtData(r.DAT_EMBARGO)}</td>
                <td><strong>${esc(r.NUM_TAD)}</strong></td>
                <td>${esc(r.NUM_PROCESSO || '')}</td>
                <td>${esc(r.NOME_EMBARGADO)}</td>
                <td>${esc(r.UF)}</td>
                <td>${esc(r.MUNICIPIO)}</td>
                <td title="${esc(r.DES_TAD)}">${esc(desc)}${desc.length < (r.DES_TAD||'').length ? '...' : ''}</td>
                <td>${esc(r.QTD_AREA_EMBARGADA)}</td>`;
            tr.dataset.record = JSON.stringify(r);
            tbody.appendChild(tr);
        });
    }

    // ---- DETAIL TOGGLE ----
    function toggleDetail(btn, type, idx) {
        const tr = btn.closest('tr');
        const next = tr.nextElementSibling;
        if (next && next.classList.contains('detail-row')) {
            next.remove();
            btn.textContent = '+';
            return;
        }
        btn.textContent = '-';
        const rec = JSON.parse(tr.dataset.record);
        const detailTr = document.createElement('tr');
        detailTr.classList.add('detail-row');

        const skipFields = new Set(['SEQ_AUTO_INFRACAO','SEQ_TAD','NUM_PESSOA_INFRATOR','NUM_PESSOA_EMBARGO','COD_MUNICIPIO']);
        const labels = {
            DAT_HORA_AUTO_INFRACAO: 'Data Auto', DT_LANCAMENTO: 'Lancamento', DT_FATO_INFRACIONAL: 'Data Fato',
            NOME_INFRATOR: 'Infrator', CPF_CNPJ_INFRATOR: 'CPF/CNPJ', TP_PESSOA_INFRATOR: 'Tipo Pessoa',
            VAL_AUTO_INFRACAO: 'Valor', TIPO_MULTA: 'Tipo Multa', TIPO_AUTO: 'Tipo Auto',
            TIPO_INFRACAO: 'Tipo Infracao', NUM_AUTO_INFRACAO: 'N. Auto', SER_AUTO_INFRACAO: 'Serie',
            UF: 'UF', MUNICIPIO: 'Municipio',
            NUM_PROCESSO: 'Processo', NU_PROCESSO_FORMATADO: 'Processo Formatado',
            DES_AUTO_INFRACAO: 'Descricao Auto', DES_INFRACAO: 'Descricao Infracao',
            DES_LOCAL_INFRACAO: 'Local', GRAVIDADE_INFRACAO: 'Gravidade',
            DS_ENQUADRAMENTO_ADMINISTRATIVO: 'Enquadramento Adm.',
            DS_ENQUADRAMENTO_NAO_ADMINISTRATIVO: 'Enquadramento Nao Adm.',
            DS_ENQUADRAMENTO_COMPLEMENTAR: 'Enquadramento Complementar',
            CLASSIFICACAO_AREA: 'Classificacao Area', UNIDADE_CONSERVACAO: 'Unid. Conservacao',
            DS_BIOMAS_ATINGIDOS: 'Biomas', NUM_LATITUDE_AUTO: 'Latitude', NUM_LONGITUDE_AUTO: 'Longitude',
            OPERACAO: 'Operacao', ORDEM_FISCALIZACAO: 'Ordem Fiscalizacao',
            DES_STATUS_FORMULARIO: 'Status', SIT_CANCELADO: 'Cancelado',
            FUNDAMENTACAO_MULTA: 'Fundamentacao', MOTIVACAO_CONDUTA: 'Motivacao',
            EFEITO_MEIO_AMBIENTE: 'Efeito Meio Ambiente', EFEITO_SAUDE_PUBLICA: 'Efeito Saude Publica',
            ULTIMA_ATUALIZACAO_RELATORIO: 'Ultima Atualizacao',
            DAT_EMBARGO: 'Data Embargo', DAT_DESEMBARGO: 'Data Desembargo',
            NOME_EMBARGADO: 'Embargado', CPF_CNPJ_EMBARGADO: 'CPF/CNPJ',
            NUM_TAD: 'N. TAD', SER_TAD: 'Serie',
            DES_TAD: 'Descricao', DES_LOCALIZACAO: 'Localizacao',
            QTD_AREA_EMBARGADA: 'Area Embargada', TIPO_AREA: 'Tipo Area',
            SIT_DESEMBARGO: 'Sit. Desembargo', TIPO_DESEMBARGO: 'Tipo Desembargo',
            DES_DESEMBARGO: 'Desc. Desembargo',
            NOME_IMOVEL: 'Imovel', DETER_PRODES: 'DETER/PRODES',
        };

        let html = '<td colspan="100%" class="detail-content"><div class="row">';
        let col = 0;
        for (const [k, v] of Object.entries(rec)) {
            if (skipFields.has(k) || !v || v === '') continue;
            const label = labels[k] || k;
            html += `<div class="col-md-4 mb-1"><dt>${esc(label)}</dt><dd>${esc(v)}</dd></div>`;
            col++;
        }
        html += '</div></td>';
        detailTr.innerHTML = html;
        tr.after(detailTr);
    }

    // ---- RESUMO ----
    function searchResumo() {
        spin('spin-resumo', true);
        const p = new URLSearchParams();
        const nome = document.getElementById('res-nome').value.trim();
        const cpf = document.getElementById('res-cpf').value.trim();
        if (nome) p.set('nome', nome);
        if (cpf) p.set('cpf_cnpj', cpf);
        if (!nome && !cpf) { spin('spin-resumo', false); alert('Informe nome ou CPF/CNPJ'); return; }

        fetch('/api/resumo?' + p).then(r => r.json()).then(d => {
            spin('spin-resumo', false);
            if (d.error) { alert(d.error); return; }
            renderResumo(d);
        }).catch(e => { spin('spin-resumo', false); alert('Erro: ' + e); });
    }

    function renderResumo(d) {
        const ai = d.autos_infracao;
        const te = d.termos_embargo;
        let html = '<div class="row g-3 mb-4">';

        // Cards
        html += `<div class="col-md-3"><div class="card stats-card">
            <h2>${ai.total_autos || 0}</h2><div class="text-muted">Autos de Infracao</div>
            <small>${ai.autos_ativos || 0} ativos / ${ai.autos_cancelados || 0} cancelados</small>
        </div></div>`;
        html += `<div class="col-md-3"><div class="card stats-card">
            <h2>${te.total_embargos || 0}</h2><div class="text-muted">Termos de Embargo</div>
            <small>${te.embargos_ativos || 0} ativos / ${te.embargos_cancelados || 0} cancelados</small>
        </div></div>`;
        html += `<div class="col-md-3"><div class="card stats-card">
            <h2>${esc(ai.valor_total || 'N/A')}</h2><div class="text-muted">Valor Total Multas</div>
            <small>autos ativos</small>
        </div></div>`;
        html += `<div class="col-md-3"><div class="card stats-card">
            <h2>${fmtData(ai.primeiro_auto)} - ${fmtData(ai.ultimo_auto)}</h2>
            <div class="text-muted">Periodo</div>
            <small>UFs: ${esc(ai.ufs || '-')}</small>
        </div></div>`;
        html += '</div>';

        // Tipos
        if (ai.tipos) {
            html += `<div class="card mb-3"><div class="card-body">
                <strong>Tipos de infracao:</strong> ${esc(ai.tipos)}<br>
                <strong>Municipios com embargo:</strong> ${esc(te.municipios || '-')}
            </div></div>`;
        }

        // Status
        if (ai.status_formulario && Object.keys(ai.status_formulario).length) {
            html += '<div class="card mb-3"><div class="card-body"><h5 class="resumo-section">Status dos Autos</h5><div class="row">';
            for (const [status, count] of Object.entries(ai.status_formulario)) {
                html += `<div class="col-md-3 mb-1"><span class="badge bg-secondary">${count}</span> ${esc(status)}</div>`;
            }
            html += '</div></div></div>';
        }

        // Ultimos autos
        if (d.ultimos_autos && d.ultimos_autos.length) {
            html += '<div class="card mb-3"><div class="card-body"><h5 class="resumo-section">Ultimos Autos Ativos</h5>';
            html += '<table class="table table-sm"><thead><tr><th>Data</th><th>Auto</th><th>Processo</th><th>Tipo</th><th>UF</th><th>Municipio</th><th>Valor</th><th>Status</th></tr></thead><tbody>';
            d.ultimos_autos.forEach(r => {
                const processo = r.NU_PROCESSO_FORMATADO || r.NUM_PROCESSO || '';
                html += `<tr>
                    <td>${fmtData(r.DAT_HORA_AUTO_INFRACAO)}</td>
                    <td>${esc(r.NUM_AUTO_INFRACAO)}</td>
                    <td>${esc(processo)}</td>
                    <td>${esc(r.TIPO_INFRACAO)}</td>
                    <td>${esc(r.UF)}</td>
                    <td>${esc(r.MUNICIPIO)}</td>
                    <td>${fmtValor(r.VAL_AUTO_INFRACAO)}</td>
                    <td>${esc(r.DES_STATUS_FORMULARIO)}</td>
                </tr>`;
            });
            html += '</tbody></table></div></div>';
        }

        // Embargos ativos
        if (d.embargos_ativos && d.embargos_ativos.length) {
            html += '<div class="card mb-3"><div class="card-body"><h5 class="resumo-section">Embargos Ativos</h5>';
            html += '<table class="table table-sm"><thead><tr><th>Data</th><th>TAD</th><th>Processo</th><th>UF</th><th>Municipio</th><th>Area</th><th>Localizacao</th></tr></thead><tbody>';
            d.embargos_ativos.forEach(r => {
                html += `<tr>
                    <td>${fmtData(r.DAT_EMBARGO)}</td>
                    <td>${esc(r.NUM_TAD)}</td>
                    <td>${esc(r.NUM_PROCESSO || '')}</td>
                    <td>${esc(r.UF)}</td>
                    <td>${esc(r.MUNICIPIO)}</td>
                    <td>${esc(r.QTD_AREA_EMBARGADA)}</td>
                    <td>${esc(r.DES_LOCALIZACAO)}</td>
                </tr>`;
            });
            html += '</tbody></table></div></div>';
        }

        document.getElementById('resumo-content').innerHTML = html;
    }
    </script>
