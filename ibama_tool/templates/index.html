    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.4/jspdf.plugin.autotable.min.js"></script>
    <script>
    const UFS = ['AC','AL','AM','AP','BA','CE','DF','ES','GO','MA','MG','MS','MT','PA','PB','PE','PI','PR','RJ','RN','RO','RR','RS','SC','SE','SP','TO'];

    // ---- LOGO FOR PDF (preload as base64) ----
    let _logoBase64 = null;
    (function preloadLogo() {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = function() {
            const c = document.createElement('canvas');
            c.width = img.width; c.height = img.height;
            c.getContext('2d').drawImage(img, 0, 0);
            _logoBase64 = c.toDataURL('image/png');
        };
        img.src = '/static/logo.png';
    })();

    // ---- RESULTS CACHE FOR PDF ----
    let _lastResults = {};

    document.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('.uf-select').forEach(sel => {
            UFS.forEach(uf => { const o = document.createElement('option'); o.value = uf; o.textContent = uf; sel.appendChild(o); });
        });
        fetch('/api/stats').then(r => r.json()).then(d => {
            const ibStats = `IBAMA: ${(d.autos_infracao||0).toLocaleString('pt-BR')} autos, ${(d.termos_embargo||0).toLocaleString('pt-BR')} embargos`;
            fetch('/api/sema/stats').then(r => r.json()).then(s => {
                const smAutos = (s.sema_autos_infracao||0).toLocaleString('pt-BR');
                const smTermos = (s.sema_outros_termos||0).toLocaleString('pt-BR');
                const smEmb = (s.sema_embargos||0).toLocaleString('pt-BR');
                const smDes = (s.sema_desembargos||0).toLocaleString('pt-BR');
                const smStats = `SEMA-MT: ${smAutos} autos, ${smTermos} termos, ${smEmb} emb., ${smDes} des.`;
                document.getElementById('db-stats').textContent = ibStats + '  |  ' + smStats;
            }).catch(() => { document.getElementById('db-stats').textContent = ibStats; });
        });
    });

    // ---- UTILS ----
    function spin(id, on) { document.getElementById(id).classList.toggle('active', on); }
    function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function fmtData(v) { if (!v) return '-'; if (v.length >= 10) return v.substring(0,10).split('-').reverse().join('/'); return v; }
    function fmtValor(v) {
        if (!v || v === '' || v === '0') return '-';
        try { const n = parseFloat(String(v).replace(/\./g,'').replace(',','.')); if (isNaN(n) || n === 0) return '-';
            return 'R$ ' + n.toLocaleString('pt-BR', {minimumFractionDigits:2}); } catch { return v; }
    }
    function fmtValorNum(v) {
        if (!v || v === '') return '-';
        try { const n = parseFloat(v); if (isNaN(n) || n === 0) return '-';
            return 'R$ ' + n.toLocaleString('pt-BR', {minimumFractionDigits:2}); } catch { return v; }
    }
    function fonteBadge(fonte) {
        if (fonte === 'SIGA') return '<span class="badge badge-siga">SIGA</span>';
        if (fonte === 'LEGADO') return '<span class="badge badge-legado">LEGADO</span>';
        if (fonte === 'DESCENTRALIZADO') return '<span class="badge badge-desc">DESC</span>';
        if (fonte === 'SIGA_TERMOS') return '<span class="badge badge-termos">TERMOS</span>';
        return '<span class="badge bg-secondary">' + esc(fonte||'') + '</span>';
    }
    function showCount(elId, total, showing, pdfKey) {
        let html = `${total} resultados (exibindo ${showing})`;
        if (pdfKey && showing > 0) html += ` <button class="btn btn-sm btn-outline-danger btn-pdf ms-2" onclick="gerarPdfPesquisa('${pdfKey}')">PDF</button>`;
        document.getElementById(elId).innerHTML = html;
    }

    // ---- DETAIL TOGGLE (generic) ----
    function toggleDetail(btn, rec) {
        const tr = btn.closest('tr');
        const next = tr.nextElementSibling;
        if (next && next.classList.contains('detail-row')) { next.remove(); btn.textContent = '+'; return; }
        btn.textContent = '-';
        const r = JSON.parse(rec);
        const skip = new Set(['NOME_NORM','MUNICIPIO_NORM','CPF_CNPJ_NORM','NUM_PROCESSO_NORM',
            'SEQ_AUTO_INFRACAO','SEQ_TAD','NUM_PESSOA_INFRATOR','NUM_PESSOA_EMBARGO','COD_MUNICIPIO']);
        let html = '<td colspan="100%" class="detail-content"><div class="row">';
        for (const [k, v] of Object.entries(r)) {
            if (skip.has(k) || !v || v === '') continue;
            html += `<div class="col-md-4 mb-1"><dt>${esc(k.replace(/_/g,' '))}</dt><dd>${esc(String(v))}</dd></div>`;
        }
        html += '</div></td>';
        const detailTr = document.createElement('tr'); detailTr.classList.add('detail-row'); detailTr.innerHTML = html;
        tr.after(detailTr);
    }

    // ================================================================
    //                    IBAMA FUNCTIONS
    // ================================================================
    function ibSearchAutos() {
        spin('spin-ib-autos', true);
        const p = new URLSearchParams();
        const map = {nome:'ib-ai-nome',cpf_cnpj:'ib-ai-cpf',uf:'ib-ai-uf',municipio:'ib-ai-municipio',
            num_auto:'ib-ai-num-auto',num_processo:'ib-ai-processo',tipo_infracao:'ib-ai-tipo',
            ano_inicio:'ib-ai-ano-ini',ano_fim:'ib-ai-ano-fim',limit:'ib-ai-limit'};
        for (const [k,id] of Object.entries(map)) { const v = document.getElementById(id).value.trim(); if (v) p.set(k,v); }
        fetch('/api/autos?'+p).then(r=>r.json()).then(d => {
            spin('spin-ib-autos',false);
            if (d.error) { alert(d.error); return; }
            _lastResults['ib-autos'] = { results: d.results, params: Object.fromEntries(p), title: 'Autos de Infracao - IBAMA' };
            showCount('count-ib-autos', d.total, d.showing, 'ib-autos');
            const t = document.getElementById('table-ib-autos');
            t.querySelector('thead').innerHTML = '<tr><th></th><th>Data</th><th>Auto</th><th>Processo</th><th>Infrator</th><th>CPF/CNPJ</th><th>Tipo</th><th>UF</th><th>Municipio</th><th>Valor</th><th>Status</th></tr>';
            const tb = t.querySelector('tbody'); tb.innerHTML = '';
            d.results.forEach(r => {
                const tr = document.createElement('tr'); tr.style.cursor = 'pointer';
                const cancel = r.SIT_CANCELADO==='S';
                const st = cancel ? '<span class="badge badge-cancelado">Cancelado</span>' : `<span class="badge bg-info">${esc(r.DES_STATUS_FORMULARIO||'Ativo')}</span>`;
                const proc = r.NU_PROCESSO_FORMATADO || r.NUM_PROCESSO || '';
                tr.dataset.record = JSON.stringify(r);
                tr.innerHTML = `<td><button class="btn btn-sm btn-outline-secondary" onclick="toggleDetail(this, this.closest('tr').dataset.record)">+</button></td>
                    <td>${fmtData(r.DAT_HORA_AUTO_INFRACAO)}</td><td><strong>${esc(r.NUM_AUTO_INFRACAO)}</strong>/${esc(r.SER_AUTO_INFRACAO)}</td>
                    <td>${esc(proc)}</td><td>${esc(r.NOME_INFRATOR)}</td><td>${esc(r.CPF_CNPJ_INFRATOR)}</td>
                    <td>${esc(r.TIPO_INFRACAO)}</td><td>${esc(r.UF)}</td><td>${esc(r.MUNICIPIO)}</td>
                    <td>${fmtValor(r.VAL_AUTO_INFRACAO)}</td><td>${st}</td>`;
                tb.appendChild(tr);
            });
        }).catch(e => { spin('spin-ib-autos',false); alert('Erro: '+e); });
    }

    function ibSearchEmbargos() {
        spin('spin-ib-embargos', true);
        const p = new URLSearchParams();
        const map = {nome:'ib-te-nome',cpf_cnpj:'ib-te-cpf',uf:'ib-te-uf',municipio:'ib-te-municipio',
            num_tad:'ib-te-num-tad',num_processo:'ib-te-processo',num_auto:'ib-te-num-auto',limit:'ib-te-limit'};
        for (const [k,id] of Object.entries(map)) { const v = document.getElementById(id).value.trim(); if (v) p.set(k,v); }
        if (document.getElementById('ib-te-ativos').checked) p.set('ativos_only','true');
        fetch('/api/embargos?'+p).then(r=>r.json()).then(d => {
            spin('spin-ib-embargos',false);
            if (d.error) { alert(d.error); return; }
            _lastResults['ib-embargos'] = { results: d.results, params: Object.fromEntries(p), title: 'Termos de Embargo - IBAMA' };
            showCount('count-ib-embargos', d.total, d.showing, 'ib-embargos');
            const t = document.getElementById('table-ib-embargos');
            t.querySelector('thead').innerHTML = '<tr><th></th><th>Data</th><th>TAD</th><th>Processo</th><th>Embargado</th><th>CPF/CNPJ</th><th>UF</th><th>Municipio</th><th>Area (ha)</th><th>Situacao</th></tr>';
            const tb = t.querySelector('tbody'); tb.innerHTML = '';
            d.results.forEach(r => {
                const tr = document.createElement('tr'); tr.style.cursor='pointer';
                let sit; if (r.SIT_CANCELADO==='S') sit='<span class="badge badge-cancelado">Cancelado</span>';
                else if (r.SIT_DESEMBARGO) sit='<span class="badge badge-desembargado">Desembargado</span>';
                else sit='<span class="badge badge-ativo">Embargado</span>';
                tr.dataset.record = JSON.stringify(r);
                tr.innerHTML = `<td><button class="btn btn-sm btn-outline-secondary" onclick="toggleDetail(this, this.closest('tr').dataset.record)">+</button></td>
                    <td>${fmtData(r.DAT_EMBARGO)}</td><td><strong>${esc(r.NUM_TAD)}</strong>/${esc(r.SER_TAD)}</td>
                    <td>${esc(r.NUM_PROCESSO||'')}</td><td>${esc(r.NOME_EMBARGADO)}</td><td>${esc(r.CPF_CNPJ_EMBARGADO)}</td>
                    <td>${esc(r.UF)}</td><td>${esc(r.MUNICIPIO)}</td><td>${esc(r.QTD_AREA_EMBARGADA)}</td><td>${sit}</td>`;
                tb.appendChild(tr);
            });
        }).catch(e => { spin('spin-ib-embargos',false); alert('Erro: '+e); });
    }

    function ibSearchTexto() {
        spin('spin-ib-texto', true);
        const q = document.getElementById('ib-fts-q').value.trim();
        if (!q) { spin('spin-ib-texto',false); return; }
        const tabela = document.getElementById('ib-fts-tabela').value;
        const limit = document.getElementById('ib-fts-limit').value;
        fetch(`/api/texto?q=${encodeURIComponent(q)}&tabela=${tabela}&limit=${limit}`).then(r=>r.json()).then(d => {
            spin('spin-ib-texto',false);
            if (d.error) { alert(d.error + (d.hint ? '\n'+d.hint : '')); return; }
            _lastResults['ib-texto'] = { results: d.results, params: {q, tabela}, title: `Busca Livre "${q}" (${tabela}) - IBAMA`, _tabela: tabela };
            showCount('count-ib-texto', d.total.toLocaleString('pt-BR'), d.showing, 'ib-texto');
            const t = document.getElementById('table-ib-texto');
            t.querySelector('thead').innerHTML = tabela==='autos'
                ? '<tr><th></th><th>Data</th><th>Auto</th><th>Infrator</th><th>UF</th><th>Municipio</th><th>Descricao</th><th>Valor</th></tr>'
                : '<tr><th></th><th>Data</th><th>TAD</th><th>Embargado</th><th>UF</th><th>Municipio</th><th>Descricao</th><th>Area</th></tr>';
            const tb = t.querySelector('tbody'); tb.innerHTML = '';
            d.results.forEach(r => {
                const tr = document.createElement('tr'); tr.style.cursor='pointer'; tr.dataset.record = JSON.stringify(r);
                if (tabela==='autos') {
                    const desc = (r.DES_AUTO_INFRACAO||'').substring(0,80);
                    tr.innerHTML = `<td><button class="btn btn-sm btn-outline-secondary" onclick="toggleDetail(this, this.closest('tr').dataset.record)">+</button></td>
                        <td>${fmtData(r.DAT_HORA_AUTO_INFRACAO)}</td><td><strong>${esc(r.NUM_AUTO_INFRACAO)}</strong></td>
                        <td>${esc(r.NOME_INFRATOR)}</td><td>${esc(r.UF)}</td><td>${esc(r.MUNICIPIO)}</td>
                        <td title="${esc(r.DES_AUTO_INFRACAO)}">${esc(desc)}...</td><td>${fmtValor(r.VAL_AUTO_INFRACAO)}</td>`;
                } else {
                    const desc = (r.DES_TAD||'').substring(0,80);
                    tr.innerHTML = `<td><button class="btn btn-sm btn-outline-secondary" onclick="toggleDetail(this, this.closest('tr').dataset.record)">+</button></td>
                        <td>${fmtData(r.DAT_EMBARGO)}</td><td><strong>${esc(r.NUM_TAD)}</strong></td>
                        <td>${esc(r.NOME_EMBARGADO)}</td><td>${esc(r.UF)}</td><td>${esc(r.MUNICIPIO)}</td>
                        <td title="${esc(r.DES_TAD)}">${esc(desc)}...</td><td>${esc(r.QTD_AREA_EMBARGADA)}</td>`;
                }
                tb.appendChild(tr);
            });
        }).catch(e => { spin('spin-ib-texto',false); alert('Erro: '+e); });
    }

    function ibSearchResumo() {
        spin('spin-ib-resumo', true);
        const p = new URLSearchParams();
        const nome = document.getElementById('ib-res-nome').value.trim();
        const cpf = document.getElementById('ib-res-cpf').value.trim();
        if (nome) p.set('nome',nome); if (cpf) p.set('cpf_cnpj',cpf);
        if (!nome && !cpf) { spin('spin-ib-resumo',false); alert('Informe nome ou CPF/CNPJ'); return; }
        fetch('/api/resumo?'+p).then(r=>r.json()).then(d => {
            spin('spin-ib-resumo',false);
            if (d.error) { alert(d.error); return; }
            _lastResults['ib-resumo'] = { data: d, params: {nome, cpf_cnpj: cpf} };
            renderIbResumo(d);
        }).catch(e => { spin('spin-ib-resumo',false); alert('Erro: '+e); });
    }

    function renderIbResumo(d) {
        const ai = d.autos_infracao, te = d.termos_embargo;
        let h = '<div class="d-flex justify-content-end mb-2"><button class="btn btn-outline-danger btn-pdf" onclick="gerarPdfIbamaResumo()">PDF Relatorio Completo</button></div>';
        h += '<div class="row g-3 mb-4">';
        h += `<div class="col-md-3"><div class="card stats-card"><h2>${ai.total_autos||0}</h2><div class="text-muted">Autos</div><small>${ai.autos_ativos||0} ativos / ${ai.autos_cancelados||0} cancelados</small></div></div>`;
        h += `<div class="col-md-3"><div class="card stats-card"><h2>${te.total_embargos||0}</h2><div class="text-muted">Embargos</div><small>${te.embargos_ativos||0} ativos</small></div></div>`;
        h += `<div class="col-md-3"><div class="card stats-card"><h2>${esc(ai.valor_total||'N/A')}</h2><div class="text-muted">Valor Total</div></div></div>`;
        h += `<div class="col-md-3"><div class="card stats-card"><h2>${fmtData(ai.primeiro_auto)} - ${fmtData(ai.ultimo_auto)}</h2><div class="text-muted">Periodo</div><small>UFs: ${esc(ai.ufs||'-')}</small></div></div>`;
        h += '</div>';
        if (d.ultimos_autos && d.ultimos_autos.length) {
            const n = d.ultimos_autos.length;
            h += `<div class="card mb-3"><div class="card-body"><h5 class="resumo-section d-flex justify-content-between align-items-center"><span>Autos de Infracao <span class="badge bg-secondary">${n}</span></span><button class="btn btn-sm btn-outline-secondary" data-bs-toggle="collapse" data-bs-target="#collapse-ib-autos">Mostrar/Ocultar</button></h5>`;
            h += `<div class="collapse show" id="collapse-ib-autos"><div class="table-responsive"><table class="table table-sm table-hover"><thead><tr><th>Data</th><th>Auto</th><th>Tipo</th><th>UF</th><th>Municipio</th><th>Valor</th><th>Status</th></tr></thead><tbody>`;
            d.ultimos_autos.forEach(r => { h += `<tr><td>${fmtData(r.DAT_HORA_AUTO_INFRACAO)}</td><td>${esc(r.NUM_AUTO_INFRACAO)}</td><td>${esc(r.TIPO_INFRACAO)}</td><td>${esc(r.UF)}</td><td>${esc(r.MUNICIPIO)}</td><td>${fmtValor(r.VAL_AUTO_INFRACAO)}</td><td>${esc(r.DES_STATUS_FORMULARIO)}</td></tr>`; });
            h += '</tbody></table></div></div></div></div>';
        }
        if (d.embargos_ativos && d.embargos_ativos.length) {
            const n = d.embargos_ativos.length;
            h += `<div class="card mb-3"><div class="card-body"><h5 class="resumo-section d-flex justify-content-between align-items-center"><span>Embargos Ativos <span class="badge bg-secondary">${n}</span></span><button class="btn btn-sm btn-outline-secondary" data-bs-toggle="collapse" data-bs-target="#collapse-ib-emb">Mostrar/Ocultar</button></h5>`;
            h += `<div class="collapse show" id="collapse-ib-emb"><div class="table-responsive"><table class="table table-sm table-hover"><thead><tr><th>Data</th><th>TAD</th><th>UF</th><th>Municipio</th><th>Area</th><th>Localizacao</th></tr></thead><tbody>`;
            d.embargos_ativos.forEach(r => { h += `<tr><td>${fmtData(r.DAT_EMBARGO)}</td><td>${esc(r.NUM_TAD)}</td><td>${esc(r.UF)}</td><td>${esc(r.MUNICIPIO)}</td><td>${esc(r.QTD_AREA_EMBARGADA)}</td><td>${esc(r.DES_LOCALIZACAO)}</td></tr>`; });
            h += '</tbody></table></div></div></div></div>';
        }
        document.getElementById('ib-resumo-content').innerHTML = h;
    }

    function renderSmResumo(d) {
        const ai = d.autos_infracao||{}, ot = d.outros_termos||{}, em = d.embargos||{}, de = d.desembargos||{};
        let h = '<div class="d-flex justify-content-end mb-2"><button class="btn btn-outline-danger btn-pdf" onclick="gerarPdfSemaResumo()">PDF Relatorio Completo</button></div>';
        h += '<div class="row g-3 mb-4">';
        h += `<div class="col-md-2"><div class="card stats-card"><h2>${ai.total||0}</h2><div class="text-muted">Autos Infracao</div></div></div>`;
        h += `<div class="col-md-2"><div class="card stats-card"><h2>${ot.total||0}</h2><div class="text-muted">Outros Termos</div></div></div>`;
        h += `<div class="col-md-2"><div class="card stats-card"><h2>${em.total||0}</h2><div class="text-muted">Embargos</div></div></div>`;
        h += `<div class="col-md-2"><div class="card stats-card"><h2>${de.total||0}</h2><div class="text-muted">Desembargos</div></div></div>`;
        h += `<div class="col-md-2"><div class="card stats-card"><h2>${esc(ai.valor_total||'N/A')}</h2><div class="text-muted">Valor Multas</div></div></div>`;
        h += `<div class="col-md-2"><div class="card stats-card"><h2>${fmtData(ai.primeiro)} - ${fmtData(ai.ultimo)}</h2><div class="text-muted">Periodo</div><small>${esc(ai.municipios||'')}</small></div></div>`;
        h += '</div>';

        function renderRecentes(titulo, recentes, showValor, collapseId) {
            if (!recentes || !recentes.length) return '';
            const n = recentes.length;
            let s = `<div class="card mb-3"><div class="card-body"><h5 class="resumo-section d-flex justify-content-between align-items-center"><span>${titulo} <span class="badge bg-secondary">${n}</span></span><button class="btn btn-sm btn-outline-secondary" data-bs-toggle="collapse" data-bs-target="#${collapseId}">Mostrar/Ocultar</button></h5>`;
            s += `<div class="collapse show" id="${collapseId}"><div class="table-responsive"><table class="table table-sm table-hover"><thead><tr><th>Fonte</th><th>Data</th><th>Tipo</th><th>Documento</th><th>Municipio</th>${showValor?'<th>Valor</th>':''}<th>Situacao</th><th>Descricao</th></tr></thead><tbody>`;
            recentes.forEach(r => {
                const desc = (r.DESCRICAO_OCORRENCIA||r.DESCRICAO_DANO||'').substring(0,60);
                s += `<tr><td>${fonteBadge(r.FONTE)}</td><td>${fmtData(r.DATA_DOCUMENTO)}</td><td>${esc(r.TIPO_DOCUMENTO)}</td><td>${esc(r.NUMERO_DOCUMENTO)}</td><td>${esc(r.MUNICIPIO)}</td>`;
                if (showValor) s += `<td>${fmtValorNum(r.VALOR_TOTAL_MULTA)}</td>`;
                s += `<td>${esc(r.SITUACAO||'')}</td><td title="${esc(r.DESCRICAO_OCORRENCIA||'')}">${esc(desc)}</td></tr>`;
            });
            s += '</tbody></table></div></div></div></div>';
            return s;
        }

        h += renderRecentes('Autos de Infracao', ai.recentes, true, 'collapse-sm-ai');
        h += renderRecentes('Outros Termos (Inspecao, Notificacao, etc.)', ot.recentes, false, 'collapse-sm-ot');
        h += renderRecentes('Embargos', em.recentes, false, 'collapse-sm-em');
        h += renderRecentes('Desembargos', de.recentes, false, 'collapse-sm-de');

        document.getElementById('sm-resumo-content').innerHTML = h;
    }

    function _pdfVal(col, r) {
        if (typeof col.f === 'function') return col.f(r) || '-';
        const v = r[col.f];
        if (!v && v !== 0) return '-';
        if (col.fmt === 'date') return fmtData(v);
        if (col.fmt === 'valor_br') { try { const n=parseFloat(String(v).replace(/\./g,'').replace(',','.')); return isNaN(n)||n===0?'-':'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2}); } catch{return v;} }
        if (col.fmt === 'valor_num') { try { const n=parseFloat(v); return isNaN(n)||n===0?'-':'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2}); } catch{return v;} }
        return String(v);
    }

    function _pdfHeader(doc, title) {
        const pw = doc.internal.pageSize.getWidth();
        doc.setFillColor(27, 94, 32);
        doc.rect(0, 0, pw, 30, 'F');
        if (_logoBase64) { try { doc.addImage(_logoBase64, 'PNG', 10, 4, 22, 22); } catch(e){} }
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(14); doc.setFont('helvetica','bold');
        doc.text(title, _logoBase64 ? 36 : 14, 13);
        doc.setFontSize(9); doc.setFont('helvetica','normal');
        const now = new Date();
        doc.text('Gerado em: ' + now.toLocaleDateString('pt-BR') + ' ' + now.toLocaleTimeString('pt-BR'), _logoBase64 ? 36 : 14, 20);
        doc.text('Consulta de AI e TEI - Diovane Franco Advogados', _logoBase64 ? 36 : 14, 25);
    }

    function _pdfFooter(doc) {
        const total = doc.internal.getNumberOfPages();
        const pw = doc.internal.pageSize.getWidth();
        const ph = doc.internal.pageSize.getHeight();
        for (let i = 1; i <= total; i++) {
            doc.setPage(i);
            doc.setFontSize(7); doc.setTextColor(150);
            doc.text('Pagina ' + i + ' de ' + total, pw/2, ph-6, {align:'center'});
            doc.text('Documento gerado automaticamente - Consulta de AI e TEI', pw/2, ph-3, {align:'center'});
        }
    }

    function gerarPdfPesquisa(key) {
        if (!window.jspdf) { alert('Biblioteca PDF nao carregada. Verifique sua conexao.'); return; }
        const cached = _lastResults[key];
        if (!cached || !cached.results || !cached.results.length) { alert('Execute uma pesquisa primeiro.'); return; }

        const cfg = PDF_CONFIGS[key];
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        const margin = 14;

        _pdfHeader(doc, cfg.title);
        let y = 36;

        // Search criteria
        doc.setTextColor(0); doc.setFontSize(9); doc.setFont('helvetica','bold');
        doc.text('Filtros aplicados:', margin, y); y += 4;
        doc.setFont('helvetica','normal');
        const params = cached.params || {};
        const pLines = [];
        for (const [k,v] of Object.entries(params)) { if (v && k!=='limit') pLines.push(k.replace(/_/g,' ')+': '+v); }
        if (pLines.length) { doc.text(pLines.join('  |  '), margin, y); y += 5; }
        doc.text('Total de registros: ' + cached.results.length, margin, y); y += 6;

        // Determine columns
        let columns;
        if (cfg.columns === 'dynamic') {
            const tab = cached._tabela || 'autos';
            columns = tab === 'autos' ? [
                {h:'Data',f:'DAT_HORA_AUTO_INFRACAO',fmt:'date'},{h:'Auto',f:'NUM_AUTO_INFRACAO'},
                {h:'Infrator',f:'NOME_INFRATOR'},{h:'UF',f:'UF'},{h:'Municipio',f:'MUNICIPIO'},
                {h:'Descricao',f:'DES_AUTO_INFRACAO'},{h:'Valor',f:'VAL_AUTO_INFRACAO',fmt:'valor_br'}
            ] : [
                {h:'Data',f:'DAT_EMBARGO',fmt:'date'},{h:'TAD',f:'NUM_TAD'},
                {h:'Embargado',f:'NOME_EMBARGADO'},{h:'UF',f:'UF'},{h:'Municipio',f:'MUNICIPIO'},
                {h:'Descricao',f:'DES_TAD'},{h:'Area',f:'QTD_AREA_EMBARGADA'}
            ];
        } else {
            columns = cfg.columns;
        }

        const head = [columns.map(c => c.h)];
        const body = cached.results.map(r => columns.map(c => _pdfVal(c, r)));

        doc.autoTable({
            startY: y, head, body,
            theme: 'striped',
            headStyles: { fillColor: [46, 125, 50], fontSize: 7 },
            bodyStyles: { fontSize: 6.5 },
            margin: { left: margin, right: margin },
            styles: { cellPadding: 1.5 }
        });

        _pdfFooter(doc);
        const fname = cfg.title.replace(/[^a-zA-Z0-9]/g,'_').substring(0,40) + '.pdf';
        doc.save(fname);
    }

    function gerarPdfSemaResumo() {
        if (!window.jspdf) { alert('Biblioteca PDF nao carregada.'); return; }
        const cached = _lastResults['sm-resumo'];
        if (!cached) { alert('Execute uma consulta de resumo primeiro.'); return; }
        const d = cached.data, params = cached.params;
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const pw = doc.internal.pageSize.getWidth();
        const margin = 14;

        _pdfHeader(doc, 'Relatorio Ambiental - SEMA-MT');
        let y = 36;

        doc.setTextColor(0); doc.setFontSize(9); doc.setFont('helvetica','bold');
        doc.text('Criterios da Pesquisa', margin, y); y += 5;
        doc.setFont('helvetica','normal');
        if (params.nome) { doc.text('Nome: ' + params.nome, margin, y); y += 4; }
        if (params.cpf_cnpj) { doc.text('CPF/CNPJ: ' + params.cpf_cnpj, margin, y); y += 4; }
        y += 3;

        const ai=d.autos_infracao||{}, ot=d.outros_termos||{}, em=d.embargos||{}, de=d.desembargos||{};

        doc.setFont('helvetica','bold'); doc.setFontSize(11);
        doc.text('Resumo Geral', margin, y); y += 5;

        doc.autoTable({
            startY: y,
            head: [['Categoria','Total','Valor Multas','Periodo','Municipios']],
            body: [
                ['Autos de Infracao', String(ai.total||0), ai.valor_total||'N/A',
                 (fmtData(ai.primeiro)||'-')+' a '+(fmtData(ai.ultimo)||'-'), ai.municipios||'-'],
                ['Outros Termos', String(ot.total||0), ot.valor_total||'N/A',
                 (fmtData(ot.primeiro)||'-')+' a '+(fmtData(ot.ultimo)||'-'), ot.municipios||'-'],
                ['Embargos', String(em.total||0), em.valor_total||'N/A',
                 (fmtData(em.primeiro)||'-')+' a '+(fmtData(em.ultimo)||'-'), em.municipios||'-'],
                ['Desembargos', String(de.total||0), de.valor_total||'N/A',
                 (fmtData(de.primeiro)||'-')+' a '+(fmtData(de.ultimo)||'-'), de.municipios||'-'],
            ],
            theme: 'grid',
            headStyles: { fillColor: [27,94,32], fontSize: 8 },
            bodyStyles: { fontSize: 7.5 },
            margin: { left: margin, right: margin }
        });
        y = doc.lastAutoTable.finalY + 8;

        function addCatTable(title, records, showValor) {
            if (!records || !records.length) return;
            if (y > 250) { doc.addPage(); y = 15; }
            doc.setFont('helvetica','bold'); doc.setFontSize(10);
            doc.setTextColor(27,94,32);
            doc.text(title + ' (' + records.length + ' registros)', margin, y); y += 3;
            doc.setTextColor(0);
            const head = [['Fonte','Data','Tipo','Documento','Municipio']];
            if (showValor) head[0].push('Valor');
            head[0].push('Situacao','Descricao');
            const body = records.map(r => {
                const row = [r.FONTE||'-', fmtData(r.DATA_DOCUMENTO), r.TIPO_DOCUMENTO||'-', r.NUMERO_DOCUMENTO||'-', r.MUNICIPIO||'-'];
                if (showValor) { try { const n=parseFloat(r.VALOR_TOTAL_MULTA); row.push(isNaN(n)||n===0?'-':'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2})); } catch{row.push('-');} }
                row.push(r.SITUACAO||'-');
                row.push((r.DESCRICAO_OCORRENCIA||r.DESCRICAO_DANO||'').substring(0,80));
                return row;
            });
            doc.autoTable({
                startY: y, head, body,
                theme: 'striped',
                headStyles: { fillColor: [46,125,50], fontSize: 7 },
                bodyStyles: { fontSize: 6.5 },
                margin: { left: margin, right: margin },
                styles: { cellPadding: 1.5 }
            });
            y = doc.lastAutoTable.finalY + 8;
        }

        addCatTable('Autos de Infracao', ai.recentes, true);
        addCatTable('Outros Termos', ot.recentes, false);
        addCatTable('Embargos', em.recentes, false);
        addCatTable('Desembargos', de.recentes, false);

        _pdfFooter(doc);
        const nome = (params.nome||params.cpf_cnpj||'consulta').replace(/[^a-zA-Z0-9]/g,'_').substring(0,40);
        doc.save('relatorio_sema_' + nome + '.pdf');
    }

    function gerarPdfIbamaResumo() {
        if (!window.jspdf) { alert('Biblioteca PDF nao carregada.'); return; }
        const cached = _lastResults['ib-resumo'];
        if (!cached) { alert('Execute uma consulta de resumo primeiro.'); return; }
        const d = cached.data, params = cached.params;
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const margin = 14;

        _pdfHeader(doc, 'Relatorio Ambiental - IBAMA');
        let y = 36;

        doc.setTextColor(0); doc.setFontSize(9); doc.setFont('helvetica','bold');
        doc.text('Criterios da Pesquisa', margin, y); y += 5;
        doc.setFont('helvetica','normal');
        if (params.nome) { doc.text('Nome: ' + params.nome, margin, y); y += 4; }
        if (params.cpf_cnpj) { doc.text('CPF/CNPJ: ' + params.cpf_cnpj, margin, y); y += 4; }
        y += 3;

        const ai = d.autos_infracao, te = d.termos_embargo;

        doc.setFont('helvetica','bold'); doc.setFontSize(11);
        doc.text('Resumo Geral', margin, y); y += 5;

        doc.autoTable({
            startY: y,
            head: [['Indicador','Valor']],
            body: [
                ['Total Autos', String(ai.total_autos||0)],
                ['Autos Ativos', String(ai.autos_ativos||0)],
                ['Autos Cancelados', String(ai.autos_cancelados||0)],
                ['Total Embargos', String(te.total_embargos||0)],
                ['Embargos Ativos', String(te.embargos_ativos||0)],
                ['Valor Total Multas', ai.valor_total||'N/A'],
                ['Periodo', (fmtData(ai.primeiro_auto)||'-')+' a '+(fmtData(ai.ultimo_auto)||'-')],
                ['UFs', ai.ufs||'-'],
                ['Municipios (Embargos)', te.municipios||'-']
            ],
            theme: 'grid',
            headStyles: { fillColor: [27,94,32], fontSize: 8 },
            bodyStyles: { fontSize: 7.5 },
            margin: { left: margin, right: margin },
            columnStyles: { 0: { fontStyle: 'bold', cellWidth: 50 } }
        });
        y = doc.lastAutoTable.finalY + 8;

        if (d.ultimos_autos && d.ultimos_autos.length) {
            if (y > 250) { doc.addPage(); y = 15; }
            doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(27,94,32);
            doc.text('Autos de Infracao (' + d.ultimos_autos.length + ' registros)', margin, y); y += 3;
            doc.setTextColor(0);
            doc.autoTable({
                startY: y,
                head: [['Data','Auto','Tipo','UF','Municipio','Valor','Status','Descricao']],
                body: d.ultimos_autos.map(r => [
                    fmtData(r.DAT_HORA_AUTO_INFRACAO), r.NUM_AUTO_INFRACAO||'-', r.TIPO_INFRACAO||'-',
                    r.UF||'-', r.MUNICIPIO||'-',
                    (()=>{ try{const n=parseFloat(String(r.VAL_AUTO_INFRACAO).replace(/\./g,'').replace(',','.'));return isNaN(n)||n===0?'-':'R$ '+n.toLocaleString('pt-BR',{minimumFractionDigits:2});}catch{return '-';}})(),
                    r.DES_STATUS_FORMULARIO||'-',
                    (r.DES_AUTO_INFRACAO||'').substring(0,80)
                ]),
                theme: 'striped',
                headStyles: { fillColor: [46,125,50], fontSize: 7 },
                bodyStyles: { fontSize: 6.5 },
                margin: { left: margin, right: margin },
                styles: { cellPadding: 1.5 }
            });
            y = doc.lastAutoTable.finalY + 8;
        }

        if (d.embargos_ativos && d.embargos_ativos.length) {
            if (y > 250) { doc.addPage(); y = 15; }
            doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(27,94,32);
            doc.text('Embargos Ativos (' + d.embargos_ativos.length + ' registros)', margin, y); y += 3;
            doc.setTextColor(0);
            doc.autoTable({
                startY: y,
                head: [['Data','TAD','UF','Municipio','Area (ha)','Localizacao','Descricao']],
                body: d.embargos_ativos.map(r => [
                    fmtData(r.DAT_EMBARGO), r.NUM_TAD||'-', r.UF||'-', r.MUNICIPIO||'-',
                    r.QTD_AREA_EMBARGADA||'-', r.DES_LOCALIZACAO||'-', (r.DES_TAD||'').substring(0,80)
                ]),
                theme: 'striped',
                headStyles: { fillColor: [46,125,50], fontSize: 7 },
                bodyStyles: { fontSize: 6.5 },
                margin: { left: margin, right: margin },
                styles: { cellPadding: 1.5 }
            });
        }

        _pdfFooter(doc);
        const nome = (params.nome||params.cpf_cnpj||'consulta').replace(/[^a-zA-Z0-9]/g,'_').substring(0,40);
        doc.save('relatorio_ibama_' + nome + '.pdf');
    }
    </script>
